<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Покупка My-Business CRM</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
        }
        
        .container {
            width: 80%;
            max-width: 600px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            padding: 20px;
            text-align: center;
        }
        
        h1 {
            color: #333;
        }
        
        p {
            line-height: 1.6;
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 10px;
        }
        
        input[type="radio"] {
            margin-right: 5px;
        }
        
        input[type="submit"] {
            padding: 10px 20px;
            font-size: 1em;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        
        input[type="submit"]:hover {
            background-color: #0056b3;
        }
        
        .price-range {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
        }
        
        .price-label {
            font-weight: bold;
            margin-right: 10px;
        }
        
        input[type="range"] {
            width: 100%;
        }
        
        .selected-price {
            margin-top: 10px;
            font-weight: bold;
        }
        
        form {
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Покупка My-Business CRM</h1>
    
    <p>Выберите подходящую цену:</p>
    
    <!-- Выбор цены -->
    <div class="price-range">
        <span class="price-label">Минимальная цена: 10$</span>
        <input type="range" min="10" max="100" value="50" step="1" id="priceRange">
        <span class="price-label">Максимальная цена: 100$</span>
    </div>
    
    <!-- Отображение выбранной цены -->
    <div class="selected-price">
        Ваша цена: <span id="currentPrice">50$</span>
    </div>
    
    <!-- Форма оплаты YooMoney -->
    <form method="POST" action="https://yoomoney.ru/quickpay/confirm">
        <!-- Скрытые поля -->
        <input type="hidden" name="receiver" value="41001xxxxxxxxxxxx"/>
        <input type="hidden" name="label" value="$order_id"/>
        <input type="hidden" name="quickpay-form" value="button"/>
        
        <!-- Сумма платежа -->
        <input type="hidden" name="sum" id="sumField" value="50" data-type="number"/>
        
        <!-- Методы оплаты -->
        <label><input type="radio" name="paymentType" value="PC" checked/>ЮMoney</label>
        <label><input type="radio" name="paymentType" value="AC"/>Банковская карта</label>
        
        <!-- Кнопка отправки -->
        <input type="submit" value="Оплатить"/>
    </form>
</div>

<script>
    // Синхронизация выбранного значения цены с формой
    const priceRange = document.getElementById('priceRange');
    const currentPrice = document.getElementById('currentPrice');
    const sumField = document.getElementById('sumField'); // Поле суммы в форме

    priceRange.addEventListener('input', () => {
        const selectedValue = parseFloat(priceRange.value);
        currentPrice.textContent = `${selectedValue.toFixed(2)}$`;
        sumField.value = selectedValue; // Устанавливаем значение суммы в форму
    });
</script>

</body>
</html>
