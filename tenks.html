<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Загрузка My-Business CRM</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;

            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
        }
        
        .container {
            width: 80%;
            max-width: 600px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            padding: 20px;
            text-align: center;
        }
        
        h1 {
            color: #333;
        }
        
        p {
            line-height: 1.6;
            margin-bottom: 20px;
        }
        
        a.download-link {
            display: inline-block;
            padding: 10px 20px;
            font-size: 1em;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.3s ease;
        }
        
        a.download-link:hover {
            background-color: #0056b3;
        }
    </style>
</head>

<div class="container">
    <h1>Спасибо за покупку!</h1>
    
    <p>Ваш заказ успешно оформлен. Нажмите кнопку ниже, чтобы скачать My-Business CRM.</p>
    
    <!-- Скачать файл -->
    <a href="downver/Key.txt" class="download-link" download>
        Лицензионный ключ
    </a>

    
    
    <p>Если возникли проблемы с активацией, пожалуйста, свяжитесь с нами по адресу <a href="mailto:company@mybusiness-crm.ru">company@mybusiness-crm.ru</a></p>
